rss:
  urls:
  - https://feeds.bbci.co.uk/news/rss.xml
  - https://rss.cnn.com/rss/edition.rss
  polling_interval: 60
  debounce_timeout: 5

anchors:
  cycle_order:
  - name: Anchor A
    focus: headline/facts
    perspective: What happened and when
    color: '#FF0000'
  - name: Anchor B
    focus: implications
    perspective: Why it matters and what comes next
    color: '#0000FF'
  - name: Anchor C
    focus: context
    perspective: Background and historical perspective
    color: '#00FF00'
  rotation_interval: 30

visuals:
  lower_third:
    enabled: true
    update_per_anchor: true
    height: 120
    font_size: 18
  ticker:
    enabled: true
    speed: 2
    height: 40
    font_size: 14
  live_tag:
    enabled: true
    position: top-left
    show_timestamp: true
    show_episode_id: true
  story_image:
    pan_zoom_enabled: true
    pan_speed: 0.5
    zoom_factor: 1.1
    duration: 120

broadcast:
  mode: "24/7"
  breaking_news_transition_duration: 2
  default_story_duration: null

tts:
  model_path: "/home/remvelchio/agent/models/piper/en_US-lessac-medium.onnx"
  config_path: "/home/remvelchio/agent/models/piper/en_US-lessac-medium.onnx.json"
  cache_dir: "/home/remvelchio/agent/tmp/audio"

video:
  output_dir: "/home/remvelchio/agent/tmp/video"
  default_duration: 6

narration:
  log_path: "/home/remvelchio/agent/tmp/scripts/narration.log"

logging:
  level: INFO
  file: /home/remvelchio/agent/logs/agente.log
