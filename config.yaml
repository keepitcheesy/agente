anchors:
  cycle_order:
  - name: Anchor A
    focus: lead intro + headline framing
    perspective: Boomer news veteran; authoritative, institutional trust, references
      history
    ideology: Establishment centrist — trusts institutions, cites precedent
    method: Open with the headline, connect to a historical parallel, frame stakes
      in terms of stability vs disruption
    color: '#FF0000'
    pitch: 1.03
  - name: Anchor B
    focus: populist critique + conflict
    perspective: Gen X skeptic; cynical, independent, anti-hype, latchkey pragmatist
    ideology: Anti-establishment pragmatist — distrusts both corporations and government
      equally
    method: Call out the spin, ask who profits, use blunt rhetorical questions, reference
      90s/2000s tech busts as cautionary tales
    color: '#0000FF'
    pitch: 0.92
  - name: Anchor C
    focus: markets + incentives
    perspective: Millennial analyst; data-literate, startup-brained, optimistically
      anxious
    ideology: Techno-optimist with student debt anxiety — believes in disruption but
      worries about access
    method: Lead with metrics and market signals, reference platform dynamics, connect
      to generational economic anxiety
    color: '#00FF00'
    pitch: 1.0
  - name: Anchor D
    focus: people + culture + vibes
    perspective: Zoomer cultural critic; meme-fluent, values-driven, blunt, short
      attention span energy
    ideology: Digital native progressive — sustainability, mental health, algorithmic
      justice
    method: Cut through jargon with plain language, reference internet culture, ask
      if anyone under 30 actually cares, call things cringe or based
    color: '#FFA500'
    pitch: 1.06
  - name: Anchor E
    focus: synthesis + moderation + course correction
    perspective: AI-aware moderator; calm, systems-minded, pulls the conversation
      back on track
    ideology: Systems pragmatist — no generation, no tribe, just pattern recognition
    method: Identify where the other anchors actually agree beneath the surface, call
      out when debate is circular, deliver a Hegelian synthesis, redirect if things
      go off the rails
    color: '#800080'
    pitch: 0.98
  rotation_interval: 60
visuals:
  lower_third:
    enabled: true
    update_per_anchor: true
    height: 120
    font_size: 18
  ticker:
    enabled: true
    speed: 2
    height: 40
    font_size: 14
  live_tag:
    enabled: true
    position: top-left
    show_timestamp: true
    show_episode_id: true
  story_image:
    pan_zoom_enabled: true
    pan_speed: 0.5
    zoom_factor: 1.1
    duration: 120
broadcast:
  mode: 24/7
  breaking_news_transition_duration: 2
  default_story_duration: null
  story_duration_seconds: 420
  segment_durations_seconds:
    anchor_a: 60
    anchor_b: 60
    anchor_c: 60
    anchor_d: 60
    roundtable: 60
  intermission_every_stories: 3
  intermission_seconds: 15
  intermission_bed_path: /home/remvelchio/agent/tmp/audio/news_bed.wav
  intermission_announcement: THIS IS AYE EYE EN EN, STAY TUNED AND SUBSCRIBE FOR MORE
    STAY TUNED
  queue_mode: true
  prebuffer_story_count: 12
  refresh_threshold: 3
  backlog_ready_flag: /home/remvelchio/agent/tmp/backlog/READY
